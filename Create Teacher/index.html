<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Teacher</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>
  <body>
    <div class="card">
      <h2>Create a teacher!!!</h2>
      <form id="teacherForm" novalidate>
        <div class="form-group">
          <label for="teacherCode">TeacherCode</label>
          <input type="text" id="teacherCode" />
          <span class="error-text">TeacherCode is required</span>
        </div>

        <div class="form-group">
          <label for="fullName">FullName</label>
          <input type="text" id="fullName" placeholder="" />
          <span class="error-text">FullName must be at least 5 character.</span>
        </div>

        <div class="form-group">
          <label for="contact">Contact</label>
          <input type="text" id="contact" />
          <span class="error-text">Contact is required</span>
        </div>

        <button type="submit" id="btnCreate">Create</button>

        <div id="mainWarning" class="warning-msg">
          Warning! Invalid input(s).
        </div>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
